<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>TSelec Admin</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#000;--sf:#0a0a0a;--cd:#111;--bd:rgba(255,255,255,.06);--ac:#38bdf8;--ac2:#818cf8;--gn:#34d399;--rd:#f87171;--am:#fbbf24}
html{scroll-behavior:smooth}
body{font-family:'Pretendard',system-ui,sans-serif;background:var(--bg);color:#f5f5f7;-webkit-font-smoothing:antialiased;overflow:hidden}
button{font-family:inherit;cursor:pointer}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:#000}::-webkit-scrollbar-thumb{background:#333;border-radius:3px}

/* === ADMIN SHELL === */
.shell{display:flex;height:100vh}
.sb{width:220px;background:#050505;border-right:1px solid var(--bd);display:flex;flex-direction:column;flex-shrink:0;z-index:100}
.sb-hd{height:48px;display:flex;align-items:center;padding:0 14px;border-bottom:1px solid var(--bd);gap:6px}
.sb-logo{display:flex;flex-direction:column;line-height:.82;font-weight:900;font-size:15px;letter-spacing:-.12em;text-transform:uppercase}
.sb-nav{flex:1;overflow-y:auto;padding:4px 6px}
.nb{width:100%;display:flex;align-items:center;gap:7px;padding:7px 10px;border:none;border-radius:7px;font-size:11px;font-weight:500;color:#555;background:none;text-align:left;transition:all .1s;position:relative}
.nb:hover{color:#bbb;background:rgba(255,255,255,.03)}.nb.on{color:#fff;background:rgba(255,255,255,.07);font-weight:600}
.nb .bdg{position:absolute;right:6px;background:#f43f5e;color:#fff;font-size:7px;font-weight:700;padding:1px 5px;border-radius:99px}
.sb-bot{padding:5px 6px 8px}
.etb,.svb{width:100%;display:flex;align-items:center;justify-content:center;gap:4px;padding:7px;border-radius:7px;font-size:10px;font-weight:600;border:1px solid var(--bd);background:rgba(255,255,255,.02);color:#777;transition:all .12s}
.etb:hover,.svb:hover{background:rgba(255,255,255,.04);color:#ccc}
.etb.on{background:var(--ac);border-color:var(--ac);color:#fff;box-shadow:0 2px 10px rgba(56,189,248,.2)}
.svb{color:var(--gn);border-color:rgba(52,211,153,.12);margin-top:4px}
.mn{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:44px;background:rgba(0,0,0,.85);backdrop-filter:blur(16px);border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;padding:0 16px;flex-shrink:0;z-index:50}
.topbar h1{font-size:12px;font-weight:700}.topbar-r{display:flex;align-items:center;gap:8px}
.eind{font-size:8px;background:rgba(56,189,248,.1);color:var(--ac);padding:2px 8px;border-radius:99px;font-weight:700;animation:pls 2s infinite}
@keyframes pls{0%,100%{opacity:1}50%{opacity:.4}}
.avt{width:24px;height:24px;border-radius:50%;background:linear-gradient(135deg,#38bdf8,#818cf8);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700}
.mc{flex:1;overflow-y:auto;padding:14px}

/* === PAGE TABS & MODE TOGGLE === */
.ptabs{display:flex;gap:3px;flex-wrap:wrap;margin-bottom:10px;padding:5px;background:var(--sf);border:1px solid var(--bd);border-radius:8px}
.ptab{padding:4px 10px;border:none;border-radius:5px;font-size:9px;font-weight:500;color:#555;background:none;transition:all .1s;white-space:nowrap}
.ptab:hover{color:#bbb;background:rgba(255,255,255,.03)}.ptab.on{color:#fff;background:rgba(255,255,255,.08);font-weight:600}
.mtog{display:inline-flex;gap:1px;padding:2px;background:var(--sf);border:1px solid var(--bd);border-radius:7px;margin-bottom:10px}
.mbtn{display:flex;align-items:center;gap:4px;padding:5px 12px;border:none;border-radius:5px;font-size:10px;font-weight:500;color:#555;background:none;transition:all .12s}
.mbtn:hover{color:#bbb}.mbtn.on{color:#fff;background:rgba(255,255,255,.07);font-weight:600}
.mbtn .dot{width:7px;height:7px;border-radius:50%;border:2px solid #444;transition:all .12s}
.mbtn.on .dot{border-color:var(--ac);background:var(--ac);box-shadow:0 0 5px rgba(56,189,248,.4)}

/* === EDITABLE === */
.editing .ed{cursor:pointer;border-radius:2px;transition:all .08s}
.editing .ed:hover{background:rgba(56,189,248,.06);box-shadow:0 0 0 1px rgba(56,189,248,.3)}
.edin{background:rgba(255,255,255,.08);border:1px solid var(--ac);border-radius:4px;padding:4px 7px;color:#fff;font:inherit;font-size:inherit;width:100%;outline:none}
textarea.edin{resize:vertical;min-height:36px}
.editing .edi{cursor:pointer;position:relative}
.editing .edi:hover::before{content:'';position:absolute;inset:0;background:rgba(0,0,0,.55);z-index:5;border-radius:inherit}
.editing .edi:hover::after{content:'📷 변경';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#fff;font-size:10px;font-weight:600;z-index:10;background:var(--ac);padding:5px 12px;border-radius:7px}
.editing .edv{cursor:pointer;position:relative}
.editing .edv{cursor:pointer;position:relative}
.editing .edv:hover{z-index:20}
.editing .edv:hover::before{content:'';position:absolute;inset:0;background:rgba(0,0,0,.55);z-index:5}
.editing .edv:hover::after{content:'🎬 변경';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#fff;font-size:10px;font-weight:600;z-index:10;background:var(--ac);padding:5px 12px;border-radius:7px}

/* === LIVE PREVIEW: WEBSITE MIRROR === */
.lv{background:#000;border-radius:12px;border:1px solid var(--bd);overflow:hidden}
.lv .slbl{position:absolute;top:6px;left:6px;z-index:20;background:rgba(0,0,0,.65);backdrop-filter:blur(6px);border:1px solid rgba(56,189,248,.2);color:var(--ac);font-size:7px;font-weight:700;padding:2px 7px;border-radius:4px;opacity:0;transition:opacity .1s;pointer-events:none}
.editing .slbl{opacity:.8}
.lv .ws{position:relative}

/* -- Navbar -- */
.w-nav{padding:0 24px;height:64px;display:flex;align-items:center;justify-content:space-between;background:transparent;border-bottom:1px solid rgba(255,255,255,.05);position:relative}
.w-nav-logo{display:flex;flex-direction:column;line-height:.85;font-weight:900;font-size:22px;letter-spacing:-.12em;text-transform:uppercase;color:#fff}
.w-nav-links{display:flex;gap:32px;align-items:center;font-size:14px;font-weight:500;color:rgba(255,255,255,.5);letter-spacing:.02em}
.w-nav-btn{padding:10px 20px;background:#fff;color:#000;border-radius:8px;font-size:14px;font-weight:500;border:none;display:inline-block}

/* -- Hero -- */
.w-hero{height:100vh;max-height:700px;position:relative;display:flex;align-items:center;justify-content:center;overflow:hidden;background:#000}
.w-hero-bg{position:absolute;inset:0}.w-hero-bg img{width:100%;height:100%;object-fit:cover;opacity:.6;mix-blend-mode:luminosity}
.w-hero-grad{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,.2),rgba(0,0,0,.8),#000)}
.w-hero-orb1{position:absolute;top:25%;left:25%;width:384px;height:384px;background:rgba(37,99,235,.2);border-radius:50%;filter:blur(120px);mix-blend-mode:screen}
.w-hero-orb2{position:absolute;bottom:25%;right:25%;width:480px;height:480px;background:rgba(147,51,234,.2);border-radius:50%;filter:blur(150px);mix-blend-mode:screen}
.w-hero-c{position:relative;z-index:10;text-align:center;max-width:900px;padding:0 24px}
.w-hero-badge{display:inline-block;margin-bottom:32px;padding:8px 20px;border-radius:9999px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.05);backdrop-filter:blur(20px);font-size:12px;font-weight:600;letter-spacing:.2em;color:#d1d5db;text-transform:uppercase;box-shadow:0 0 30px rgba(255,255,255,.05)}
.w-hero-title{font-size:clamp(36px,7vw,80px);font-weight:700;letter-spacing:-.04em;line-height:1.1;margin-bottom:24px;color:#fff}
.w-hero-title .gradient{background:linear-gradient(to right,#60a5fa,#818cf8,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(0 0 25px rgba(129,140,248,.4))}
.w-hero-sub{font-size:clamp(16px,2.5vw,24px);color:#9ca3af;font-weight:300;max-width:640px;margin:0 auto;line-height:1.6}

/* -- Clients -- */
.w-clients{padding:80px 0;border-bottom:1px solid rgba(255,255,255,.05);overflow:hidden;position:relative;background:#000}
.w-clients::before,.w-clients::after{content:'';position:absolute;top:0;bottom:0;width:192px;z-index:10;pointer-events:none}
.w-clients::before{left:0;background:linear-gradient(to right,#000,transparent)}
.w-clients::after{right:0;background:linear-gradient(to left,#000,transparent)}
.w-clients-label{text-align:center;font-size:11px;font-weight:600;letter-spacing:.3em;color:#6b7280;text-transform:uppercase;margin-bottom:40px}
.w-clients-track{display:flex;gap:96px;align-items:center;animation:marquee 30s linear infinite;white-space:nowrap}
@keyframes marquee{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.w-client-name{font-size:28px;font-weight:700;color:rgba(255,255,255,.25);letter-spacing:-.03em;transition:color .5s}

/* -- Expertise -- */
.w-exp{padding:100px 24px;background:var(--sf);border-top:1px solid rgba(255,255,255,.05);box-shadow:0 -30px 50px rgba(0,0,0,.8)}
.w-exp-hd{text-align:center;margin-bottom:40px;position:relative}
.w-exp-badge{font-size:11px;font-weight:700;letter-spacing:.3em;color:#38bdf8;text-transform:uppercase;margin-bottom:16px}
.w-exp-title{font-size:clamp(24px,5vw,48px);font-weight:700;letter-spacing:-.04em;line-height:1.15;color:#fff}
.w-exp-title span{background:linear-gradient(to right,#e5e7eb,#6b7280);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.w-exp-grid{display:flex;flex-direction:column;gap:20px;max-width:1100px;margin:0 auto}
@media(max-width:860px){.w-exp-grid{gap:16px}}
.w-exp-card{background:rgba(39,39,42,.5);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.1);border-radius:32px;overflow:hidden;display:flex;flex-direction:row}
.w-exp-card-img{width:50%;height:100%;min-height:240px;position:relative}
.w-exp-card-img img{width:100%;height:100%;object-fit:cover;opacity:.6;mix-blend-mode:luminosity}
.w-exp-card-img .gd{position:absolute;inset:0;background:linear-gradient(to right,transparent,rgba(39,39,42,.9))}
.w-exp-card-body{width:50%;padding:32px;display:flex;flex-direction:column;justify-content:center}
.w-exp-card-body .sub{font-size:11px;font-weight:700;letter-spacing:.2em;color:#d1d5db;text-transform:uppercase;margin-bottom:12px}
.w-exp-card-body h3{font-size:clamp(24px,3vw,36px);font-weight:700;color:#fff;letter-spacing:-.02em;margin-bottom:16px}
.w-exp-card-body p{font-size:16px;color:#9ca3af;font-weight:300;line-height:1.6}

/* -- About -- */
.w-about{padding:128px 24px;background:#000}
.w-about-grid{display:grid;grid-template-columns:1fr 1fr;gap:80px;max-width:1200px;margin:0 auto;align-items:center}
@media(max-width:860px){.w-about-grid{grid-template-columns:1fr;gap:40px}}
.w-about-title{font-size:clamp(28px,5vw,56px);font-weight:700;letter-spacing:-.04em;line-height:1.1;margin-bottom:32px}
.w-about-title .gray{color:#6b7280}
.w-about-desc{font-size:20px;color:#9ca3af;font-weight:300;line-height:1.6;margin-bottom:48px}
.w-stats{display:grid;grid-template-columns:1fr 1fr;gap:32px}
.w-stat-val{font-size:clamp(28px,4vw,48px);font-weight:700;color:#fff;margin-bottom:8px}
.w-stat-lbl{font-size:14px;color:#6b7280;font-weight:500;letter-spacing:.02em}
.w-about-vid{position:relative;height:600px;border-radius:24px;overflow:hidden}
@media(max-width:860px){.w-about-vid{height:360px}}
.w-about-vid video{position:absolute;top:50%;left:50%;width:300%;height:300%;transform:translate(-50%,-50%);object-fit:cover}
.w-about-vid .ov{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.9),rgba(0,0,0,.2));pointer-events:none}
.w-about-vid-info{position:absolute;bottom:40px;left:40px;z-index:10}
.w-about-vid-info .lbl{font-size:12px;color:#9ca3af;font-weight:600;letter-spacing:.15em;text-transform:uppercase;margin-bottom:8px}
.w-about-vid-info .ttl{font-size:24px;font-weight:700;color:#fff}

/* -- Products -- */
.w-prods{padding:128px 24px;background:#000}
.w-prods-hd{max-width:1200px;margin:0 auto 60px}
.w-prods-hd h2{font-size:clamp(28px,5vw,56px);font-weight:700;letter-spacing:-.04em;line-height:1.1}
.w-bento{display:grid;grid-template-columns:repeat(3,1fr);grid-auto-rows:300px;gap:24px;max-width:1200px;margin:0 auto}
@media(max-width:860px){.w-bento{grid-template-columns:1fr 1fr;grid-auto-rows:240px}}
.w-pcard{position:relative;border-radius:32px;overflow:hidden;background:var(--sf);border:1px solid rgba(255,255,255,.05);transition:border-color .3s}
.w-pcard:hover{border-color:rgba(255,255,255,.12)}
.w-pcard.big{grid-column:span 2;grid-row:span 2}
.w-pcard img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:.6;transition:opacity .7s}
.w-pcard:hover img{opacity:.8}
.w-pcard .grd{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.9),rgba(0,0,0,.2));pointer-events:none}
.w-pcard .inf{position:absolute;bottom:0;left:0;padding:32px;z-index:10}
.w-pcard .inf h3{font-size:24px;font-weight:700;color:#fff;letter-spacing:-.02em;margin-bottom:8px}
.w-pcard .inf p{font-size:14px;color:#9ca3af;font-weight:300}

/* -- FAQ -- */
.w-faq{padding:128px 24px;background:#09090b;border-top:1px solid rgba(255,255,255,.05);position:relative}
.w-faq-hd{max-width:800px;margin:0 auto 64px}
.w-faq-hd h2{font-size:clamp(28px,4vw,48px);font-weight:700;letter-spacing:-.04em;margin-bottom:16px}
.w-faq-hd p{font-size:18px;color:#9ca3af;font-weight:300}
.w-faq-list{max-width:800px;margin:0 auto}
.w-faq-item{border-bottom:1px solid rgba(255,255,255,.1);overflow:hidden;transition:background .2s}
.w-faq-item.open{background:rgba(255,255,255,.05);border-radius:16px;border-color:transparent;margin-bottom:8px}
.w-faq-q{width:100%;display:flex;align-items:center;justify-content:space-between;padding:24px 32px;border:none;background:none;color:#9ca3af;font-size:18px;font-weight:500;text-align:left;font-family:inherit;cursor:pointer;transition:color .2s;letter-spacing:-.01em}
.w-faq-q:hover,.w-faq-item.open .w-faq-q{color:#fff}
.w-faq-tg{width:32px;height:32px;border-radius:50%;border:1px solid #374151;display:flex;align-items:center;justify-content:center;font-size:16px;color:#6b7280;flex-shrink:0;transition:all .2s}
.w-faq-item.open .w-faq-tg{border-color:#38bdf8;background:rgba(56,189,248,.1);color:#38bdf8}
.w-faq-a{padding:0 32px 24px;font-size:14px;color:#9ca3af;font-weight:300;line-height:1.7;display:none}
.w-faq-item.open .w-faq-a{display:block}

/* -- News -- */
.w-news{padding:80px 24px;border-top:1px solid rgba(255,255,255,.05);background:#000}
.w-news-hd{max-width:1200px;margin:0 auto 48px;display:flex;justify-content:space-between;align-items:flex-end}
.w-news-hd h2{font-size:clamp(24px,4vw,48px);font-weight:700;letter-spacing:-.04em;margin-bottom:8px}
.w-news-hd p{font-size:14px;color:#9ca3af;font-weight:300}
.w-news-list{max-width:1200px;margin:0 auto}
.w-news-item{display:flex;align-items:center;justify-content:space-between;padding:24px;border-radius:16px;background:var(--sf);border:1px solid rgba(255,255,255,.05);margin-bottom:12px;transition:background .2s;gap:16px}
.w-news-item:hover{background:var(--cd)}
.w-news-cat{font-size:14px;color:#6b7280;font-weight:500;min-width:80px;flex-shrink:0}
.w-news-ttl{font-size:18px;font-weight:500;color:#e5e7eb;flex:1}
.w-news-new{display:inline-block;margin-left:12px;padding:2px 8px;border-radius:9999px;background:rgba(255,255,255,.1);color:#fff;font-size:10px;font-weight:700;letter-spacing:.05em}
.w-news-date{font-size:14px;color:#6b7280;font-family:'Courier New',monospace;flex-shrink:0}

/* -- History -- */
.w-history{padding:128px 24px;background:var(--sf)}
.w-history h2{text-align:center;font-size:clamp(28px,5vw,56px);font-weight:700;letter-spacing:-.04em;margin-bottom:80px}
.w-tl{max-width:800px;margin:0 auto;position:relative}
.w-tl::before{content:'';position:absolute;left:50%;top:0;bottom:0;width:1px;background:linear-gradient(to bottom,transparent,rgba(255,255,255,.1),transparent);transform:translateX(-50%)}
.w-tl-item{display:flex;align-items:center;justify-content:center;margin-bottom:64px;position:relative}
.w-tl-dot{width:16px;height:16px;border-radius:50%;border:2px solid rgba(255,255,255,.2);background:var(--sf);z-index:5;flex-shrink:0;transition:all .3s;box-shadow:0 0 15px rgba(255,255,255,.1)}
.w-tl-item:hover .w-tl-dot{background:#fff;border-color:#fff;box-shadow:0 0 20px rgba(255,255,255,.3)}
.w-tl-content{width:calc(50% - 48px);padding:32px;background:var(--cd);border:1px solid rgba(255,255,255,.05);border-radius:32px;transition:all .3s}
.w-tl-item:hover .w-tl-content{background:#151515;border-color:rgba(255,255,255,.1)}
.w-tl-item:nth-child(odd) .w-tl-content{margin-right:auto}
.w-tl-item:nth-child(even) .w-tl-content{margin-left:auto}
.w-tl-year{font-size:36px;font-weight:700;letter-spacing:-.02em;margin-bottom:12px;color:#fff}
.w-tl-text{font-size:14px;color:#9ca3af;font-weight:300;line-height:1.6}

/* -- Contact -- */
.w-contact{padding:128px 24px;background:#000}
.w-contact-grid{display:grid;grid-template-columns:1fr 1fr;gap:80px;max-width:1200px;margin:0 auto}
@media(max-width:860px){.w-contact-grid{grid-template-columns:1fr;gap:40px}}
.w-contact-title{font-size:clamp(28px,5vw,56px);font-weight:700;letter-spacing:-.04em;line-height:1.1;margin-bottom:12px}
.w-contact-sub{font-size:20px;color:#9ca3af;font-weight:300;margin-bottom:48px}
.w-ci{display:flex;gap:24px;align-items:flex-start;margin-bottom:32px}
.w-ci-icon{width:48px;height:48px;border-radius:50%;background:#1a1a1a;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.w-ci-lbl{font-size:12px;color:#6b7280;font-weight:600;letter-spacing:.15em;text-transform:uppercase;margin-bottom:4px}
.w-ci-val{font-size:18px;font-weight:500;color:#fff}
.w-form{background:var(--sf);padding:40px;border-radius:32px;border:1px solid rgba(255,255,255,.05)}
.w-form h3{font-size:24px;font-weight:700;margin-bottom:4px}.w-form .sub{font-size:14px;color:#9ca3af;margin-bottom:32px}
.w-fg{margin-bottom:24px}.w-fg label{display:block;font-size:14px;color:#9ca3af;font-weight:500;margin-bottom:8px}
.w-fg input,.w-fg textarea{width:100%;background:rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:12px 16px;color:#fff;font-family:inherit;font-size:14px;outline:none}
.w-fg textarea{resize:none;height:100px}
.w-form-btn{width:100%;padding:16px;background:#fff;color:#000;border:none;border-radius:12px;font-size:16px;font-weight:500;font-family:inherit}

/* -- Footer -- */
.w-footer{border-top:1px solid rgba(255,255,255,.1);padding:80px 24px 40px;background:#000}
.w-ft-grid{display:grid;grid-template-columns:1.5fr 1fr 1fr 1fr;gap:48px;max-width:1200px;margin:0 auto 64px}
@media(max-width:860px){.w-ft-grid{grid-template-columns:1fr 1fr}}
.w-ft-logo{display:flex;flex-direction:column;line-height:.85;font-weight:900;font-size:26px;letter-spacing:-.12em;text-transform:uppercase;margin-bottom:24px}
.w-ft-desc{font-size:14px;color:#6b7280;line-height:1.6}
.w-ft-col h4{font-size:12px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:#fff;margin-bottom:24px}
.w-ft-col ul{list-style:none}.w-ft-col li{margin-bottom:16px;font-size:14px;color:#6b7280}
.w-ft-bottom{display:flex;justify-content:space-between;align-items:center;max-width:1200px;margin:0 auto;padding:32px 0 0;border-top:1px solid rgba(255,255,255,.1)}
.w-ft-copy{font-size:12px;color:#4b5563}
.w-ft-badges{display:flex;gap:8px}.w-ft-badges span{font-size:12px;color:#9ca3af;padding:4px 12px;border-radius:9999px;border:1px solid rgba(255,255,255,.1)}

/* === FIELD LIST MODE === */

function rBoard(type,title,items){
  const isN=type==='news';
  const opt=S.boardOpt[type]||{showDate:true,showViews:true,filter:'전체',search:'',openId:null};
  const cats=isN?['전체','공지사항','보도자료','이벤트']:['전체','카탈로그','데이터시트','인증서','매뉴얼','소프트웨어'];
  // Filter & search
  let filtered=items;
  if(opt.filter!=='전체')filtered=filtered.filter(x=>x.cat===opt.filter);
  if(opt.search)filtered=filtered.filter(x=>x.title.includes(opt.search)||x.content.includes(opt.search));
  // Detail view
  const openItem=opt.openId?items.find(x=>x.id===opt.openId):null;
  if(openItem){
    return `<div style="max-width:800px;margin:0 auto">
      <button onclick="S.boardOpt.${type}.openId=null;R()" style="display:flex;align-items:center;gap:6px;padding:8px 16px;background:rgba(255,255,255,.04);border:1px solid var(--bd);border-radius:8px;color:#aaa;font-size:11px;font-family:inherit;margin-bottom:16px">← 목록으로</button>
      <div style="background:var(--sf);border:1px solid var(--bd);border-radius:14px;overflow:hidden">
        <div style="padding:24px 28px;border-bottom:1px solid var(--bd)">
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
            <span style="font-size:10px;background:rgba(56,189,248,.1);color:var(--ac);padding:3px 10px;border-radius:6px;font-weight:600">${openItem.cat}</span>
            ${opt.showDate?`<span style="font-size:10px;color:#666;font-family:monospace">${openItem.date}</span>`:''}
            ${opt.showViews?`<span style="font-size:10px;color:#666">조회 ${openItem.views}</span>`:''}
          </div>
          <h2 style="font-size:20px;font-weight:700;letter-spacing:-.02em">${openItem.title}</h2>
          <div style="font-size:10px;color:#555;margin-top:6px">작성자: ${openItem.author||'관리자'}</div>
        </div>
        <div style="padding:24px 28px;font-size:13px;color:#ccc;line-height:1.8;min-height:120px;white-space:pre-wrap">${openItem.content||'(내용 없음)'}</div>
        ${!isN&&openItem.file?`<div style="padding:16px 28px;border-top:1px solid var(--bd);display:flex;align-items:center;gap:10px">
          <span style="font-size:11px;color:#888">📎 ${openItem.file}</span>
          ${openItem.fileData?`<button onclick="dlFile('${type}','${openItem.id}')" style="padding:4px 12px;background:rgba(56,189,248,.1);border:1px solid rgba(56,189,248,.2);border-radius:6px;color:var(--ac);font-size:10px;font-weight:600;font-family:inherit">다운로드</button>`:''}</div>`:''}
        <div style="padding:16px 28px;border-top:1px solid var(--bd);display:flex;gap:6px">
          <button onclick="showBM('${type}',${items.indexOf(openItem)})" style="padding:7px 18px;background:var(--ac);border:none;border-radius:7px;color:#fff;font-size:11px;font-weight:600;font-family:inherit">수정</button>
          <button onclick="if(confirm('정말 삭제하시겠습니까?')){${isN?'S.news':'S.downloads'}.splice(${items.indexOf(openItem)},1);S.boardOpt.${type}.openId=null;R();toast('삭제됨')}" style="padding:7px 18px;background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.15);border-radius:7px;color:var(--rd);font-size:11px;font-weight:600;font-family:inherit">삭제</button>
        </div>
      </div>
    </div>`;
  }
  // List view
  return `<div style="max-width:900px;margin:0 auto">
    <!-- Header -->
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <h3 style="font-size:16px;font-weight:700">${title} <span style="font-size:12px;color:#666;font-weight:400">(${filtered.length}건)</span></h3>
      <button onclick="showBM('${type}')" style="display:flex;align-items:center;gap:5px;padding:8px 16px;background:var(--ac);border:none;border-radius:8px;color:#fff;font-size:11px;font-weight:600;font-family:inherit">+ 새 글 작성</button>
    </div>
    <!-- Controls: search + display options -->
    <div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center">
      <div style="position:relative;flex:1;min-width:180px">
        <span style="position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:12px;color:#555">🔍</span>
        <input placeholder="검색어 입력..." value="${opt.search}" oninput="S.boardOpt.${type}.search=this.value;R()" style="width:100%;background:rgba(255,255,255,.04);border:1px solid var(--bd);border-radius:8px;padding:8px 10px 8px 30px;color:#fff;font-family:inherit;font-size:11px;outline:none"/>
      </div>
      <!-- Display toggles -->
      <div style="display:flex;align-items:center;gap:12px;padding:6px 14px;background:var(--sf);border:1px solid var(--bd);border-radius:8px">
        <label style="display:flex;align-items:center;gap:5px;font-size:10px;color:#888;cursor:pointer;user-select:none">
          <input type="checkbox" ${opt.showDate?'checked':''} onchange="S.boardOpt.${type}.showDate=this.checked;R()" style="accent-color:var(--ac);width:13px;height:13px"/> 날짜
        </label>
        <label style="display:flex;align-items:center;gap:5px;font-size:10px;color:#888;cursor:pointer;user-select:none">
          <input type="checkbox" ${opt.showViews?'checked':''} onchange="S.boardOpt.${type}.showViews=this.checked;R()" style="accent-color:var(--ac);width:13px;height:13px"/> 조회수
        </label>
      </div>
    </div>
    <!-- Category filter tabs -->
    <div style="display:flex;gap:4px;margin-bottom:14px;overflow-x:auto">
      ${cats.map(c=>`<button onclick="S.boardOpt.${type}.filter='${c}';R()" style="padding:6px 16px;border-radius:8px;font-size:11px;font-weight:500;font-family:inherit;white-space:nowrap;border:1px solid ${opt.filter===c?'rgba(255,255,255,.15)':'var(--bd)'};background:${opt.filter===c?'rgba(255,255,255,.1)':'rgba(255,255,255,.02)'};color:${opt.filter===c?'#fff':'#666'}">${c}</button>`).join('')}
    </div>
    <!-- Table -->
    <div style="background:var(--sf);border:1px solid var(--bd);border-radius:12px;overflow:hidden">
      <table class="b-tbl">
        <thead><tr>
          <th style="width:24px;text-align:center">#</th>
          <th style="width:70px">분류</th>
          <th>제목</th>
          ${!isN?'<th style="width:100px">첨부파일</th>':''}
          ${opt.showDate?'<th style="width:80px">날짜</th>':''}
          ${opt.showViews?'<th style="width:50px;text-align:right">조회</th>':''}
          <th style="width:60px;text-align:right">관리</th>
        </tr></thead>
        <tbody>${filtered.length===0?`<tr><td colspan="10" style="text-align:center;padding:32px;color:#555;font-size:12px">${opt.search?'검색 결과가 없습니다':'등록된 글이 없습니다'}</td></tr>`:''}
        ${filtered.map((it,i)=>{
          const origIdx=items.indexOf(it);
          return `<tr style="cursor:pointer" onclick="S.boardOpt.${type}.openId='${it.id}';${isN?'S.news':'S.downloads'}[${origIdx}].views++;R()">
            <td style="text-align:center;font-size:9px;color:#555">${filtered.length-i}</td>
            <td><span style="font-size:9px;background:rgba(255,255,255,.04);padding:2px 7px;border-radius:4px;color:#999;font-weight:500">${it.cat}</span></td>
            <td style="font-weight:500">${it.title}${it===items[0]?'<span style="display:inline-block;margin-left:6px;font-size:8px;font-weight:700;background:rgba(56,189,248,.1);color:var(--ac);padding:1px 6px;border-radius:99px">NEW</span>':''}</td>
            ${!isN?`<td style="font-size:9px;color:#777">${it.file?'📎 '+it.file:'-'}</td>`:''}
            ${opt.showDate?`<td style="font-size:10px;color:#666;font-family:monospace">${it.date}</td>`:''}
            ${opt.showViews?`<td style="text-align:right;font-size:10px;color:#666">${it.views}</td>`:''}
            <td style="text-align:right" onclick="event.stopPropagation()">
              <button onclick="showBM('${type}',${origIdx})" style="background:none;border:none;font-size:11px;color:#666;padding:2px" title="수정">✏️</button>
            </td>
          </tr>`}).join('')}
        </tbody>
      </table>
    </div>
    <!-- Summary -->
    <div style="display:flex;justify-content:space-between;align-items:center;margin-top:10px;font-size:10px;color:#555">
      <span>전체 ${items.length}건${opt.filter!=='전체'?' / 필터: '+opt.filter:''}${opt.search?' / 검색: "'+opt.search+'"':''}</span>
      <span>표시 옵션: ${opt.showDate?'날짜 ✓':'날짜 ✗'} · ${opt.showViews?'조회수 ✓':'조회수 ✗'}</span>
    </div>
  </div>`;
}

// File download
function dlFile(type,id){
  const items=type==='news'?S.news:S.downloads;
  const item=items.find(x=>x.id===id);
  if(!item||!item.fileData)return;
  const a=document.createElement('a');a.href=item.fileData;a.download=item.file||'download';document.body.appendChild(a);a.click();document.body.removeChild(a);toast(item.file+' 다운로드');
}

let _pf=null,_pfn='';
function showBM(type,idx){
  const isE=idx!==undefined,isN=type==='news',items=isN?S.news:S.downloads,item=isE?items[idx]:{cat:'',title:'',content:'',file:'',fileData:null};
  const cats=isN?['공지사항','보도자료','이벤트']:['카탈로그','데이터시트','인증서','매뉴얼','소프트웨어'];
  _pf=isE?item.fileData:null;_pfn=isE?(item.file||''):'';
  showModal(isE?'글 수정':'새 글 작성',`
    <div class="fg"><label>분류</label><select id="bC" style="padding:9px 12px">${cats.map(c=>`<option ${item.cat===c?'selected':''}>${c}</option>`).join('')}</select></div>
    <div class="fg"><label>제목</label><input id="bT" value="${(item.title||'').replace(/"/g,'&quot;')}" style="padding:9px 12px"/></div>
    <div class="fg"><label>내용</label><textarea id="bCt" style="height:120px;padding:9px 12px">${item.content||''}</textarea></div>
    ${!isN?`<div class="fg"><label>첨부파일</label>
      <div style="display:flex;align-items:center;gap:8px;padding:9px 12px;background:rgba(0,0,0,.3);border:1px solid var(--bd);border-radius:8px;margin-bottom:6px">
        <span id="fD" style="font-size:11px;color:#999;flex:1">${_pfn?'📎 '+_pfn:'첨부파일 없음'}</span>
        ${_pfn?`<button onclick="_pf=null;_pfn='';$('#fD').textContent='첨부파일 없음'" style="background:none;border:none;color:var(--rd);font-size:13px">✕</button>`:''}
      </div>
      <button onclick="$('#fileUp').click()" style="width:100%;padding:10px;border:1px dashed rgba(255,255,255,.12);border-radius:8px;background:rgba(255,255,255,.02);color:#aaa;font-size:11px;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:6px;transition:border-color .15s" onmouseover="this.style.borderColor='rgba(56,189,248,.3)'" onmouseout="this.style.borderColor='rgba(255,255,255,.12)'">📁 파일 선택 (PDF, ZIP, 이미지 등)</button>
    </div>`:''}
    ${isE?`<div style="padding:10px 0;border-top:1px solid var(--bd);margin-top:8px;display:flex;gap:16px;font-size:10px;color:#666">
      <span>작성일: ${item.date}</span><span>조회수: ${item.views}</span><span>작성자: ${item.author||'관리자'}</span>
    </div>`:''}
  `,()=>{
    const ni={
      id:isE?item.id:Date.now().toString(),
      cat:$('#bC').value,
      title:$('#bT').value,
      content:$('#bCt').value,
      date:isE?item.date:new Date().toISOString().split('T')[0].replace(/-/g,'.'),
      author:'관리자',
      views:isE?item.views:0
    };
    if(!isN){ni.file=_pfn;ni.fileData=_pf}
    if(isE){if(isN)S.news[idx]=ni;else S.downloads[idx]=ni}
    else{if(isN)S.news.unshift(ni);else S.downloads.unshift(ni)}
    _pf=null;_pfn='';
    if(isE)S.boardOpt[type].openId=ni.id;
    R();toast(isE?'수정 완료':'등록 완료');
  });
}
$('#fileUp').addEventListener('change',function(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onloadend=()=>{_pf=r.result;_pfn=f.name;const d=$('#fD');if(d)d.innerHTML='📎 '+f.name+' <span style="color:#555">('+((f.size/1024).toFixed(0))+'KB)</span>'};r.readAsDataURL(f);this.value=''});
function rInq(){return `<div style="max-width:700px;margin:0 auto">${S.inquiries.map(i=>`<div style="background:var(--sf);border:1px solid var(--bd);border-radius:10px;padding:14px;margin-bottom:6px"><div style="display:flex;justify-content:space-between;margin-bottom:6px"><div><b style="font-size:12px">${i.nm}</b> <span style="font-size:10px;color:#666">${i.co}</span> <span style="font-size:7px;font-weight:700;padding:2px 6px;border-radius:99px;${i.st==='new'?'background:rgba(56,189,248,.08);color:#38bdf8':i.st==='replied'?'background:rgba(52,211,153,.08);color:#34d399':'background:rgba(251,191,36,.08);color:#fbbf24'}">${i.st==='new'?'신규':i.st==='replied'?'답변완료':'진행중'}</span></div><span style="font-size:9px;color:#555">${i.date}</span></div><p style="font-size:11px;color:#888;background:rgba(0,0,0,.2);border:1px solid var(--bd);border-radius:7px;padding:8px">${i.msg}</p><button style="margin-top:6px;padding:5px 14px;border:none;border-radius:5px;background:var(--ac);color:#fff;font-size:10px;font-weight:600;font-family:inherit">답변</button></div>`).join('')}</div>`}
function rSet(){return `<div style="max-width:440px;margin:0 auto"><div class="sc" style="padding:16px;margin-bottom:8px"><div style="font-size:12px;font-weight:700;margin-bottom:12px">일반</div><div class="fg"><label>사이트 제목</label><input value="태승전자(주) TSELEC"/></div><div class="fg"><label>비밀번호</label><input type="password" placeholder="새 비밀번호"/></div><button onclick="toast('저장')" style="width:100%;padding:8px;border:none;border-radius:6px;background:#fff;color:#000;font-size:11px;font-weight:600;font-family:inherit">저장</button></div><div class="sc" style="padding:16px"><div style="font-size:12px;font-weight:700;margin-bottom:8px">데이터</div><button onclick="exJ()" style="padding:6px 10px;border:1px solid var(--bd);border-radius:5px;background:rgba(255,255,255,.02);color:#888;font-size:9px;font-family:inherit">JSON 내보내기</button></div></div>`}
function exJ(){const d=JSON.stringify({content:S.content,images:S.images,videos:S.videos,clients:S.clients,news:S.news,downloads:S.downloads},null,2);const b=new Blob([d],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='tselec-content.json';a.click();toast('JSON 다운로드')}

R();
document.addEventListener('click',e=>{const a=e.target.closest('a');if(a){const h=a.getAttribute('href');if(h&&!h.startsWith('javascript:')&&!h.startsWith('blob:')&&!h.startsWith('data:'))e.preventDefault()}},true);
</script>
